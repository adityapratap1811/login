<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #1f2937;
}

/* Main Container */
.container {
    width: 100%;
    max-width: 380px;
    text-align: center;
}

/* Logo */
.logo {
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 25px;
    color: #4f46e5;
    letter-spacing: 1px;
}

/* Card */
.card {
    border-radius: 18px;
    padding: 32px;
    text-align: left;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 10px 30px rgba(79,70,229,0.08);
}

/* Title */
h2 {
    text-align: center;
    margin-bottom: 22px;
    font-weight: 600;
    color: #111827;
}

/* Inputs */
.input-group {
    margin-bottom: 16px;
    position: relative;
}

input {
    width: 100%;
    padding: 13px;
    border: 1px solid #dbe2ff;
    border-radius: 10px;
    font-size: 14px;
    background: #f9faff;
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #6366f1;
    background: white;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
}

/* Button */
button {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 18px rgba(99,102,241,0.25);
}

button:hover {
    transform: translateY(-2px);
    opacity: 0.95;
}

/* Links */
.switch {
    margin-top: 18px;
    text-align: center;
    font-size: 14px;
    color: #555;
}

.switch a {
    color: #4f46e5;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
}

.switch a:hover {
    text-decoration: underline;
}

/* Forgot Password */
.forgot-password {
    text-align: right;
    margin-top: 5px;
    margin-bottom: 15px;
}

.forgot-password a {
    color: #6366f1;
    font-size: 13px;
    text-decoration: none;
    cursor: pointer;
}

.forgot-password a:hover {
    text-decoration: underline;
}

/* Hidden Name */
#nameGroup {
    display: none;
}

/* Modal styles */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(15,23,42,0.45);
    backdrop-filter: blur(4px);
}

.modal-content {
    background: white;
    margin: 18% auto;
    padding: 30px;
    border-radius: 18px;
    max-width: 400px;
    position: relative;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

.close {
    position: absolute;
    right: 18px;
    top: 12px;
    font-size: 24px;
    cursor: pointer;
    color: #999;
    transition: 0.3s;
}

.close:hover {
    color: #111;
}

.modal h3 {
    margin-bottom: 18px;
    color: #111827;
}

.modal p {
    margin-bottom: 15px;
    font-size: 14px;
    color: #666;
}

.modal input {
    margin-bottom: 18px;
}

/* Responsive */
@media (max-width: 480px) {
    .container {
        padding: 20px;
    }

    .card {
        padding: 25px;
    }

    .logo {
        font-size: 26px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">Create Account</div>

    <div class="card">
        <h2 id="title">Log in</h2>

        <form id="authForm">

            <div id="nameGroup" class="input-group">
                <input type="text" id="fullname" placeholder="Full name">
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="forgot-password">
                <a onclick="openForgotModal()">Forgot password?</a>
            </div>

            <button type="submit" id="submitBtn">Continue</button>

            <div class="switch">
                <span id="switchText">Don't have an account?</span>
                <a id="toggleMode">Sign up</a>
            </div>

        </form>
    </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeForgotModal()">&times;</span>

        <h3>Reset Password</h3>

        <p>Enter your email to receive reset instructions</p>

        <input 
            type="email" 
            id="resetEmail" 
            placeholder="Email address"
        >

        <button onclick="sendResetLink()">
            Send Reset Link
        </button>
    </div>
</div>

<script>
const form = document.getElementById('authForm');
const toggleMode = document.getElementById('toggleMode');
const title = document.getElementById('title');
const nameGroup = document.getElementById('nameGroup');
const switchText = document.getElementById('switchText');
const submitBtn = document.getElementById('submitBtn');

let isLogin = true;

// Forgot password modal functions
function openForgotModal() {
    document.getElementById('forgotModal').style.display = 'block';
}

function closeForgotModal() {
    document.getElementById('forgotModal').style.display = 'none';
    document.getElementById('resetEmail').value = '';
}

async function sendResetLink() {

    const email = document.getElementById('resetEmail').value;

    if (!email) {
        alert('Please enter your email address');
        return;
    }

    try {

        const response = await fetch('/forgot-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email })
        });

        const data = await response.json();

        alert(data.message);

        closeForgotModal();

    } catch (err) {
        alert('Server error. Please try again.');
    }
}

// Close modal when clicking outside
window.onclick = function(event) {

    const modal = document.getElementById('forgotModal');

    if (event.target === modal) {
        closeForgotModal();
    }
}

// Toggle Login / Signup
toggleMode.addEventListener('click', () => {

    isLogin = !isLogin;

    if (isLogin) {

        title.textContent = "Log in";
        nameGroup.style.display = "none";
        switchText.textContent = "Don't have an account?";
        toggleMode.textContent = "Sign up";

    } else {

        title.textContent = "Sign up";
        nameGroup.style.display = "block";
        switchText.textContent = "Already have an account?";
        toggleMode.textContent = "Log in";
    }
});

// API Call
form.addEventListener('submit', async (e) => {

    e.preventDefault();

    const endpoint = isLogin
        ? '/login'
        : '/signup';

    const payload = isLogin
        ? {
            email: email.value,
            password: password.value
        }
        : {
            fullname: fullname.value,
            email: email.value,
            password: password.value
        };

    submitBtn.disabled = true;
    submitBtn.textContent = 'Processing...';

    try {

        const res = await fetch(endpoint, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.ok) {

            alert(data.message);

            if (!isLogin) {

                setTimeout(() => {

                    isLogin = true;

                    title.textContent = "Log in";
                    nameGroup.style.display = "none";
                    switchText.textContent = "Don't have an account?";
                    toggleMode.textContent = "Sign up";

                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';

                    alert("Account created! Please login");

                }, 1000);

            } else {

                window.location.href = '/dashboard';
            }

        } else {

            alert(data.message);
        }

    } catch (err) {

        alert("Server not running");
        console.error(err);

    } finally {

        submitBtn.disabled = false;
        submitBtn.textContent = isLogin ? 'Continue' : 'Sign Up';
    }
});
</script>

</body>
</html>
