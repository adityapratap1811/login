<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6fb;
    color:#222;
}

/* Navbar */

.navbar{
    background:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#4f46e5;
}

.user-info{
    display:flex;
    align-items:center;
    gap:15px;
}

.user-name{
    font-weight:500;
}

.logout-btn{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:#4f46e5;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.logout-btn:hover{
    background:#4338ca;
}

/* Container */

.container{
    max-width:1100px;
    margin:auto;
    padding:25px;
}

/* Welcome */

.welcome-section{
    background:#4f46e5;
    color:white;
    padding:30px;
    border-radius:14px;
    margin-bottom:25px;
}

.welcome-section h1{
    font-size:30px;
    margin-bottom:10px;
}

/* Stats */

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.stat-card{
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.stat-title{
    font-size:13px;
    color:#666;
    margin-bottom:10px;
    text-transform:uppercase;
}

.stat-value{
    font-size:35px;
    font-weight:bold;
}

/* Two Columns */

.two-columns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:white;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.card-header{
    padding:18px 20px;
    border-bottom:1px solid #eee;
    font-weight:bold;
    font-size:18px;
}

.card-content{
    padding:20px;
}

/* Activity */

.activity-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid #f1f1f1;
}

.activity-item:last-child{
    border-bottom:none;
}

.activity-date{
    font-size:12px;
    color:#888;
    width:85px;
}

.activity-text{
    flex:1;
    margin:0 10px;
    font-size:14px;
}

.activity-badge{
    padding:5px 10px;
    border-radius:20px;
    font-size:11px;
    font-weight:bold;
}

.badge-coding{
    background:#e0e7ff;
    color:#4338ca;
}

.badge-feature{
    background:#dcfce7;
    color:#15803d;
}

.badge-debug{
    background:#fef3c7;
    color:#b45309;
}

/* Notifications */

.notification{
    padding:14px;
    border-radius:10px;
    margin-bottom:12px;
    font-size:14px;
}

.notification.success{
    background:#ecfdf5;
    border-left:4px solid #10b981;
}

.notification.info{
    background:#eff6ff;
    border-left:4px solid #3b82f6;
}

/* Loading */

.loading{
    text-align:center;
    padding:50px;
}

.spinner{
    width:40px;
    height:40px;
    border:4px solid #ddd;
    border-top:4px solid #4f46e5;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* Responsive */

@media(max-width:768px){

    .two-columns{
        grid-template-columns:1fr;
    }

    .container{
        padding:15px;
    }

    .welcome-section h1{
        font-size:24px;
    }
}

</style>
</head>

<body>

<nav class="navbar">

    <div class="logo">Dashboard</div>

    <div class="user-info">

        <span class="user-name" id="userName"></span>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

</nav>

<div class="container">

    <div id="dashboardContent">

        <div class="loading">

            <div class="spinner"></div>

            <p style="margin-top:15px;">
                Loading dashboard...
            </p>

        </div>

    </div>

</div>

<script>

async function loadDashboard(){

    try{

        const response = await fetch('/api/dashboard');

        if(response.status === 401){
            window.location.href = '/';
            return;
        }

        const data = await response.json();

        renderDashboard(data);

    }catch(error){

        console.log(error);

        document.getElementById('dashboardContent').innerHTML = `
            <div class="card">
                <div class="card-content" style="text-align:center;">
                    Failed to load dashboard
                </div>
            </div>
        `;
    }
}

function renderDashboard(data){

    const {
        user,
        stats,
        recent_activity,
        notifications
    } = data;

    document.getElementById('userName').textContent = user.fullname;

    document.getElementById('dashboardContent').innerHTML = `

        <div class="welcome-section">
            <h1>Welcome back, ${user.fullname}</h1>
            <p>Here's your dashboard overview ✨</p>
        </div>

        <div class="stats-grid">

            <div class="stat-card">
                <div class="stat-title">Total Visits</div>
                <div class="stat-value">${stats.total_visits}</div>
            </div>

            <div class="stat-card">
                <div class="stat-title">Projects</div>
                <div class="stat-value">${stats.projects_completed}</div>
            </div>

            <div class="stat-card">
                <div class="stat-title">Active Days</div>
                <div class="stat-value">${stats.internship_days}</div>
            </div>

            <div class="stat-card">
                <div class="stat-title">Achievements</div>
                <div class="stat-value">${stats.achievements}</div>
            </div>

        </div>

        <div class="two-columns">

            <div class="card">

                <div class="card-header">
                    Recent Activity
                </div>

                <div class="card-content">

                    ${recent_activity.map(activity => `

                        <div class="activity-item">

                            <div class="activity-date">
                                ${activity.date}
                            </div>

                            <div class="activity-text">
                                ${activity.activity}
                            </div>

                            <div class="activity-badge badge-${activity.type}">
                                ${activity.type}
                            </div>

                        </div>

                    `).join('')}

                </div>

            </div>

            <div class="card">

                <div class="card-header">
                    Notifications
                </div>

                 <div class="card-content">

                    ${notifications.map(notification => `

                        <div class="notification ${notification.type}">
                            ${notification.message}
                        </div> 

                    `).join('')}

                </div>

            </div>

        </div>
    `;
}

async function logout(){

    try{

        const response = await fetch('/logout',{
            method:'POST'
        });

        if(response.ok){
            window.location.href='/';
        }

    }catch(error){

        alert('Logout failed');
    }
}

loadDashboard();

</script>

</body>
</html>
